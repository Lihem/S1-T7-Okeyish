repo:
  name: "logstash"
  path: "../logstash-main"
  language: "java"
  source_root: "logstash-core"
  file_extensions: [".java", ".rb"]
  exclude_patterns:
    - "*/test/*"
    - "*/tests/*"
    - "*/spec/*"
    - "*/benchmarks/*"
    - "*/generated/*"
    - "*/build/*"
    - "*/module-info.java"
    - "*/package-info.java"
  max_file_lines: 2000
  min_file_lines: 10

llm:
  primary_provider: "gemini"
  secondary_provider: "gemini"
  temperature_range: [0.2, 0.8]
  max_output_tokens: 16384

scan:
  scans_per_principle: 12
  principles: ["SRP", "OCP", "LSP", "ISP", "DIP"]
  output_dir: "scans"
  reports_dir: "reports"

refactor:
  build_system: "gradle"           # logstash uses Gradle (gradlew wrapper in repo root)
  gradle_test_task: ":logstash-core:test"   # multi-module: scope to logstash-core
  gradle_compile_task: ":logstash-core:compileTestJava"
  test_timeout_sec: 2400.0         # only used if testing is re-enabled later
  full_suite_timeout_sec: 5400.0
  temperature: 0.2
  max_output_tokens: 65536
