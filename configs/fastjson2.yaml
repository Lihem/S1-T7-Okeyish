repo:
  name: "fastjson2"
  path: "../../fastjson2"
  language: "java"  # <-- Burası kesinlikle "java" olmak zorunda
  source_root: "core/src/main/java"
  file_extensions: [".java"]
  exclude_patterns:
    - "*/test/*"
    - "*/tests/*"
    - "*/benchmark/*"
    - "*/generated/*"
    - "*/module-info.java"
    - "*/package-info.java"
  max_file_lines: 2000
  min_file_lines: 10

llm:
  primary_provider: "gemini"
  secondary_provider: "gemini"
  temperature_range: [0.2, 0.8]
  max_output_tokens: 16384

scan:
  scans_per_principle: 12
  principles: ["SRP", "OCP", "LSP", "ISP", "DIP"]
  output_dir: "scans"
  reports_dir: "reports"

refactor:  # <-- DİKKAT: Burası en sola yaslı olmalı (önünde boşluk olmamalı)
  build_system: "maven"
  test_timeout_sec: 1800.0
  full_suite_timeout_sec: 3600.0
  temperature: 0.2
  max_output_tokens: 65536