repo:
  name: "seaborn-master"
  path: "../seaborn-master"
  language: "python"
  source_root: "seaborn"
  file_extensions: [".py"]
  exclude_patterns:
    - "*/tests/*"
    - "*/__pycache__/*"
    - "*/test_*"
    - "*/_compat.py"
  max_file_lines: 500
  min_file_lines: 10

llm:
  primary_provider: "gemini"
  secondary_provider: "gemini"
  temperature_range: [0.2, 0.8]
  max_output_tokens: 16384

scan:
  scans_per_principle: 12
  principles: ["SRP", "OCP", "LSP", "ISP", "DIP"]
  output_dir: "scans"
  reports_dir: "reports"

refactor:
  python_executable: "C:/Users/User/miniconda3/python.exe"
  install_extras: ".[dev,stats]"
  test_timeout_sec: 1800.0
  full_suite_timeout_sec: 3600.0
  temperature: 0.2
  max_output_tokens: 65536
