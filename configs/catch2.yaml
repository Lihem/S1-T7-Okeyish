repo:
  name: "Catch2"
  path: "../Catch2-devel"
  language: "c++"
  source_root: "."
  file_extensions: [".cpp", ".hpp", ".h", ".cc", ".cxx"]
  exclude_patterns:
    - "*/test/*"
    - "*/tests/*"
    - "*/benchmarks/*"
    - "*/fuzzing/*"
    - "*/third_party/*"
    - "*/build/*"
  max_file_lines: 2000
  min_file_lines: 10

llm:
  primary_provider: "gemini"
  secondary_provider: "gemini"
  temperature_range: [0.2, 0.8]
  max_output_tokens: 16384

scan:
  scans_per_principle: 12
  principles: ["SRP", "OCP", "LSP", "ISP", "DIP"]
  output_dir: "scans"
  reports_dir: "reports"

refactor:
  test_timeout_sec: 1800.0
  full_suite_timeout_sec: 3600.0
  temperature: 0.2
  max_output_tokens: 65536
